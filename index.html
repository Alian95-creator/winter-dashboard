<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Winter Weather App</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="winter-bg">

  <!-- Header -->
  <header>
    <h1>Winter Weather App</h1>
    <p>Check the weather in your city now</p>
  </header>

  <!-- Search Section -->
  <section class="search-section">
    <input type="text" id="cityInput" placeholder="Enter city name..." />
    <button id="searchBtn">Search</button>
  </section>

  <!-- Weather Result -->
  <main class="weather-container">

    <div class="weather-card">
      <h2 id="cityName">City</h2>

      <p class="temperature">
        🌡 Temperature: <span id="temp">--</span>°C
      </p>

      <p class="description">
        🌥 Condition: <span id="desc">--</span>
      </p>

      <p class="humidity">
        💧 Humidity: <span id="humidity">--</span>%
      </p>

    </div>

  </main>

  <!-- Footer -->
  <footer>
    <p>Built with Vanilla JavaScript, DOM & Weather API</p>
  </footer>

  <script src="script.js"></script>

</body>
</html>
